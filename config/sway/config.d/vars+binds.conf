################################### Variables ###################################

# Logo key. Use Mod1 for Alt.
set $mod Mod4

# Home row direction keys, like vim
set $left h
set $down j
set $up k
set $right l

# Terminal emulator
set $term kitty

# Application launcher
set $menu rofi -show drun

# Browser
set $browser exec ~/Applications/Gui/zen-x86_64.AppImage

# File manager
set $file_manager thunar

# Airdrop
set $airdrop exec ~/Applications/Gui/LocalSend.AppImage

# Text editor
set $text exec ~/Applications/Gui/Obsidian.AppImage

# Screenshot tool
set $screenshot grim

# Screen locking tool
set $lock swaylock
#################################### Binds ####################################

# Take screenshot via grim
bindsym Print exec $screenshot

# Brightness raise with swayosd
bindsym XF86MonBrightnessUp exec swayosd-client --brightness raise 
# Brightness lower with swayosd
bindsym XF86MonBrightnessDown exec swayosd-client --brightness lower 
# Fallback
# Brightness Control via brightnessctl 
#bindsym --locked XF86MonBrightnessDown exec brightnessctl set 5%-
#bindsym --locked XF86MonBrightnessUp exec brightnessctl set 5%+

# Sink volume raise with swayosd
bindsym XF86AudioRaiseVolume exec swayosd-client --output-volume raise
# Sink volume lower with swayosd
bindsym XF86AudioLowerVolume exec  swayosd-client --output-volume lower 
# Sink volume toggle mute with swayosd
bindsym XF86AudioMute exec swayosd-client --output-volume mute-toggle
# Fallback
# Volume Control via wpctl (PipeWire)
#bindsym --locked XF86AudioMute exec wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
#bindsym --locked XF86AudioLowerVolume exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
#bindsym --locked XF86AudioRaiseVolume exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+

# Lock screen
bindsym $mod+Alt+l exec $lock

# Logout
bindsym XF86PowerOff exec wlogout

# Start terminal
bindsym $mod+t exec $term

# Kill focused window
bindsym $mod+x kill

# Start launcher
bindsym $mod+space exec $menu

# Start browser
bindsym $mod+b exec $browser

# Launch airdrop
bindsym $mod+a exec $airdrop

# Launch text editor
bindsym $mod+o exec $text

# Start file manager
bindsym $mod+e exec $file_manager

# Drag floating windows by holding down $mod and left mouse button.
# Resize them with right mouse button + $mod.
# Despite the name, also works for non-floating windows.
# Change normal to inverse to use left mouse button for resizing and right
    # mouse button for dragging.
    floating_modifier $mod normal

# Reload the configuration file
bindsym $mod+Shift+c reload

# Exit sway (log out of your Wayland session)
bindsym $mod+Shift+e exec swaynag -t warning -m 'You pressed the exit shortcut. Do you really want to exit sway? This will end your Wayland session.' -B 'Yes, exit sway' 'swaymsg exit'

# Move focus around windows
bindsym $mod+$left focus left
bindsym $mod+$down focus down
bindsym $mod+$up focus up
bindsym $mod+$right focus right

# Move around windows in the same workspace
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

# Workspaces:

    # Set workspaces to desktop
    workspace 1 output eDP-1
    workspace 2 output eDP-1
    workspace 3 output eDP-1
    workspace 4 output eDP-1
    workspace 5 output eDP-1
    workspace 6 output eDP-1

    # Switch to workspace
    bindsym $mod+1 workspace number 1
    bindsym $mod+2 workspace number 2
    bindsym $mod+3 workspace number 3
    bindsym $mod+4 workspace number 4
    bindsym $mod+5 workspace number 5
    bindsym $mod+6 workspace number 6

    # Move focused window to workspace
    bindsym $mod+Shift+1 move container to workspace number 1
    bindsym $mod+Shift+2 move container to workspace number 2
    bindsym $mod+Shift+3 move container to workspace number 3
    bindsym $mod+Shift+4 move container to workspace number 4
    bindsym $mod+Shift+5 move container to workspace number 5
    bindsym $mod+Shift+6 move container to workspace number 6
    # Note: workspaces can have any name we want, not just numbers.
    # I just use 1-6 as the default.

    # Move focused window to next/prev workspace
    bindsym $mod+Shift+$left exec ~/Scripts/sway/persistent_workspace.sh prev
    bindsym $mod+Shift+$right exec ~/Scripts/sway/persistent_workspace.sh next


# Layout stuff:
    # Make the current focus fullscreen
    bindsym $mod+f fullscreen

    # Toggle the current focus between tiling and floating mode
    bindsym $mod+Shift+space floating toggle
